### Perfil para TESTE: H2 Database

# application-test.yml
spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect
  # Host fake para que o auto-configure crie um JavaMailSender bean
  # (testes que exercitam o envio mockam o EmailService, nao o sender)
  mail:
    host: localhost
    port: 2525

jwt:
  private-key-path: classpath:keys/jwt-test-private.key
  public-key-path: classpath:keys/jwt-test-public.key

admin:
  username: admin
  password: testpass
  email: admin@consultas-medicas.local

app:
  frontend-url: http://localhost:4200
  password-recovery:
    email-remetente: noreply@test.local

# Capacidades reduzidas para tornar testes de 429 rapidos e deterministicos
rate-limit:
  login:
    capacidade: 3
    periodo-segundos: 60
  password-recovery:
    capacidade: 2
    periodo-segundos: 60
