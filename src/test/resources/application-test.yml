### Perfil para TESTE: H2 Database

# application-test.yml
spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

jwt:
  private-key-path: classpath:keys/jwt-test-private.key
  public-key-path: classpath:keys/jwt-test-public.key

admin:
  username: admin
  password: testpass

# Capacidade reduzida para tornar o teste de 429 rapido e deterministico
rate-limit:
  login:
    capacidade: 3
    periodo-segundos: 60
