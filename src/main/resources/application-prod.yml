### Perfil para PRODUCAO (deploy na Railway)
# Use a env var DATABASE_URL no formato JDBC, ex.:
#   jdbc:postgresql://<host>:<port>/<db>?user=<u>&password=<p>
# Alternativamente, separar credenciais em SPRING_DATASOURCE_USERNAME / SPRING_DATASOURCE_PASSWORD
# (Spring faz auto-bind dessas envs sem precisar declarar aqui).

spring:
  datasource:
    url: ${DATABASE_URL}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate # producao: schema ja existente, so valida

  # SMTP em producao: host/credenciais via env (ex.: SendGrid, AWS SES, SMTP corporativo).
  mail:
    host: ${SPRING_MAIL_HOST}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

jwt:
  private-key-path: ${JWT_PRIVATE_KEY_PATH}
  public-key-path: ${JWT_PUBLIC_KEY_PATH}

admin:
  username: ${ADMIN_USERNAME}
  password: ${ADMIN_PASSWORD}
  email: ${ADMIN_EMAIL}

# Sobrescreve o default de application.yml para nunca rodar o seed em producao
popular:
  banco: false
