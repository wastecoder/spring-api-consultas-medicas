### PERFIL ATIVO DA APLICAO
# - dev      >>> Ativa o arquivo: application-dev.yml
# - test     >>> Ativa o arquivo: application-test.yml
# - docker   >>> Ativa o arquivo: application-docker.yml

### OBSERVACOES:
# - Voce nao precisa alterar este valor manualmente.
# - Nos testes, o perfil sera definido automaticamente pela anotacao: @ActiveProfiles("test")
# - No Docker, o perfil sera definido pela variavel de ambiente: SPRING_PROFILES_ACTIVE=docker

spring:
  profiles:
    active: dev

  # Defaults comuns de JPA (cada perfil sobrescreve datasource e ddl-auto)
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # SMTP padrao via Mailtrap sandbox: inbox falsa para inspecionar emails de teste em dev/docker.
  # O perfil 'prod' sobrescreve estes valores com SMTP corporativo (TLS obrigatorio).
  mail:
    host: ${SPRING_MAIL_HOST:sandbox.smtp.mailtrap.io}
    port: ${SPRING_MAIL_PORT:2525}
    username: ${MAILTRAP_USERNAME:}
    password: ${MAILTRAP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# Caminhos das chaves RSA usadas pelo JWT. Em dev/docker apontam para ./keys no projeto;
# em prod a env JWT_*_KEY_PATH precisa vir do ambiente de deploy (ex.: secret manager).
jwt:
  private-key-path: ${JWT_PRIVATE_KEY_PATH:file:./keys/jwt-private.key}
  public-key-path: ${JWT_PUBLIC_KEY_PATH:file:./keys/jwt-public.key}

# Usuario admin criado no primeiro boot (SecurityConfig#criarUsuarioInicial).
# Defaults servem para dev local; em docker/prod usar env vars.
admin:
  username: ${ADMIN_USERNAME:admin}
  password: ${ADMIN_PASSWORD:123456}
  email: ${ADMIN_EMAIL:admin@consultas-medicas.local}

# Define se o banco de dados deve ser populado ao iniciar a aplicacao
popular:
  banco: true

# Rate limit aplicado em /auth/login (chave por par IP + username),
# em /auth/forgot-password (chave por par IP + email)
# e em /auth/signup (chave por par IP + email).
rate-limit:
  login:
    capacidade: 10
    periodo-segundos: 60
  password-recovery:
    capacidade: 3
    periodo-segundos: 3600
  signup:
    capacidade: 5
    periodo-segundos: 3600

# Cache de relatorios pesados (Caffeine, in-memory).
# - ttl-segundos: por quanto tempo um resultado permanece em cache antes de ser
#   reexecutado contra o banco. Como nao usamos @CacheEvict, este TTL e o unico
#   mecanismo de invalidacao -- aceita-se defasagem de ate este valor.
# - tamanho-maximo: numero maximo de entradas somando todos os caches.
app:
  cache:
    ttl-segundos: 60
    tamanho-maximo: 500
  # URL do front-end usada para montar o link enviado por email na recuperacao de senha.
  frontend-url: ${APP_FRONTEND_URL:http://localhost:4200}
  password-recovery:
    email-remetente: ${APP_PASSWORD_RECOVERY_REMETENTE:noreply@consultas-medicas.local}

# Observabilidade: Actuator + Micrometer (Prometheus)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: api-consultas
  info:
    env:
      enabled: true

info:
  app:
    name: API Consultas Medicas
    descricao: API REST para gestao de consultas medicas
    versao: 0.0.1-SNAPSHOT
